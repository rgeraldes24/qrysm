# Full configuration reference [here](https://github.com/theQRL/qrl-package?tab=readme-ov-file#configuration).
participants:
  - el_type: gqrl
    el_image: qrledger/go-qrl:stable
    cl_type: qrysm
    cl_image: qrledger/qrysm:beacon-chain-latest
    cl_extra_params:
      - "--min-sync-peers=0"
      - "--minimum-peers-per-subnet=0"
      - "--sync-from=head"
    # local build
    # cl_image: theqrl-dev/qrysm-beacon-chain:latest
    vc_type: qrysm
    vc_image: qrledger/qrysm:validator-latest
    # local build
    # vc_image: theqrl-dev/qrysm-validator:latest
    count: 2
    # use_remote_signer: true
    # remote_signer_type: clef
network_params:
  preset: "mainnet"
  prefunded_accounts: '{"Q57fEEB5132CEfcD23FaCb1EE7e13FE687999c307AD8dD345E8e864dF781c571Cbfdf09a2e422f943017111c43648de6d": {"balance": "2000000QRL"}, "Q1a486f8261C071F56848015D51d4c9640015a33974DFD3c1b2f1CB53C01b53a300f8c750d2447bf58b96f7987d13b2ba": {"balance": "2000000QRL"}}' # tx spammer/clef accounts
  light_kdf_enabled: True
